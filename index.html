<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
  <title>khalahamed</title>
  <link rel="icon" type="image/png" href="webicon.png">
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>khalahamed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #intro {
      position: fixed;
      inset: 0;
      z-index: 100;
      cursor: pointer;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    #intro img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #intro.visible {
      opacity: 1;
    }

    #intro.saliendo {
      opacity: 0;
      transition: opacity 1s ease;
    }

    #contenido {
      opacity: 0;
      transition: opacity 1s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 0 50px;
      min-height: 100vh;
    }

    #contenido.visible {
      opacity: 1;
    }

    .contenedor {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      width: 530px;
      max-width: 90vw;
    }

    .contenedor img {
      width: 100%;
      display: block;
    }

    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    nav a, .contacto {
      color: black;
      text-decoration: none;
      font-size: 17px;
      letter-spacing: 4px;
      text-transform: lowercase;
      transition: opacity 0.2s;
    }

    nav a:hover, .contacto:hover { opacity: 0.35; }

    .contacto {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    #sorpresa {
      position: fixed;
      width: 400px;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    @media (max-width: 768px) {
      #intro {
        background: #000;
      }

      #intro img {
        object-fit: contain;
      }

      #sorpresa {
        width: 200px;
      }
    }
  </style>
</head>
<body>

  <div id="intro">
    <img id="introImg" src="back1.png" alt="">
  </div>

  <div id="contenido">
    <div class="contenedor">
      <img src="postback.png" alt="">
      <nav>
        <a href="https://soundcloud.com/20149173" target="_blank">soundcloud</a>
        <a href="https://instagram.com/khalahamedd" target="_blank">instagram</a>
        <a href="mailto:keepgoing9173@gmail.com" class="contacto">contacto</a>
      </nav>
    </div>
  </div>

  <img id="sorpresa" src="egokid.png">

  <audio id="musica" src="5.mp3" loop></audio>

  <script>
    const intro = document.getElementById('intro');
    const introImg = document.getElementById('introImg');
    const contenido = document.getElementById('contenido');
    const musica = document.getElementById('musica');
    const sorpresa = document.getElementById('sorpresa');

    const backs = [
      'back1.png','back2.png','back3.png','back4.png',
      'back5.png','back6.png','back7.png','back8.png'
    ];

    backs.forEach(src => { new Image().src = src; });

    let bi = 0;
    let intervaloBack = null;

    setTimeout(() => {
      intro.classList.add('visible');

      intervaloBack = setInterval(() => {
        bi = (bi + 1) % backs.length;
        introImg.src = backs[bi];
      }, 100);

    }, 100);

    intro.addEventListener('click', () => {
      clearInterval(intervaloBack);
      musica.play();
      intro.classList.add('saliendo');

      setTimeout(() => {
        intro.style.display = 'none';
        document.body.style.overflow = 'auto';
        contenido.classList.add('visible');
        iniciarSorpresa();
      }, 1000);
    });

    function mostrarSorpresa() {
      const maxX = window.innerWidth - 150;
      const maxY = window.innerHeight - 150;
      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      sorpresa.style.left = randomX + 'px';
      sorpresa.style.top = randomY + 'px';
      sorpresa.style.opacity = '1';

      setTimeout(() => {
        sorpresa.style.opacity = '0';
      }, 1000);

      const proximaVez = Math.random() * 6000 + 2000;
      setTimeout(mostrarSorpresa, proximaVez);
    }

    function iniciarSorpresa() {
      setTimeout(mostrarSorpresa, Math.random() * 4000 + 1000);
    }
  </script>

</body>
</html>
